name: Squid Telemetry Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC daily
  workflow_dispatch:    # Allows manual triggering

permissions:
  contents: write

jobs:
  scrape-and-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas matplotlib

      - name: Run Telemetry Scraper
        env:
          TRAFFIC_READ_PAT: ${{ secrets.TRAFFIC_READ_PAT }}
          GITLAB_READ_PAT: ${{ secrets.GITLAB_READ_PAT }}
        run: python scraper.py

      - name: Generate Cumulative XKCD Graph
        run: python generate_graph.py

      - name: Commit and Push Database and Graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force traffic_metrics.db cumulative_downloads.png
          
          # Only commit and push if the database or image actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: update telemetry DB and rendering" && git push origin main)
